name: CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    if: ${{ github.repository_owner == 'Itosang' && (github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Resolve build metadata
        id: meta
        run: |
          commitTitle="$(git log -1 --pretty=%s)"
          commitMessage="$(git log -1 --pretty=%B)"
          branchName="${GITHUB_REF#refs/heads/}"
          isRelease=false
          versionChannel=ci
          if [[ "$branchName" == "main" && "$commitTitle" == "[release]"* ]]; then
            isRelease=true
            versionChannel=release
          fi
          echo "commitTitle=$commitTitle" >> "$GITHUB_OUTPUT"
          echo "branchName=$branchName" >> "$GITHUB_OUTPUT"
          echo "isRelease=$isRelease" >> "$GITHUB_OUTPUT"
          echo "versionChannel=$versionChannel" >> "$GITHUB_OUTPUT"
          {
            echo "commitMessage<<__COMMIT_MESSAGE__"
            echo "$commitMessage"
            echo "__COMMIT_MESSAGE__"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Write key
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          touch signing.properties
          echo KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} >> signing.properties
          echo KEYSTORE_ALIAS=${{ secrets.KEYSTORE_ALIAS }} >> signing.properties
          echo KEYSTORE_ALIAS_PASSWORD='${{ secrets.KEYSTORE_ALIAS_PASSWORD }}' >> signing.properties
          echo KEYSTORE_FILE=../key.jks >> signing.properties
          echo '${{ secrets.KEYSTORE }}' | base64 --decode > key.jks

      - name: Write temporary key
        if: hashFiles('key.jks') == '' && !steps.vars.outputs.HAS_SECRET
        run: |
          keytool -genkey -alias a -dname CN=_ -storepass passwd -keypass passwd -keystore key.jks -keyalg RSA
          echo KEYSTORE_PASSWORD=passwd >> signing.properties
          echo KEYSTORE_ALIAS=a >> signing.properties
          echo KEYSTORE_ALIAS_PASSWORD=passwd >> signing.properties
          echo KEYSTORE_FILE=../key.jks >> signing.properties

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-app-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: |
            gradle-deps

      - name: Cache Gradle Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-builds-app-${{ github.sha }}
          restore-keys: |
            gradle-builds

      - name: Build with Gradle
        id: buildWithGradle
        run: |
          echo >> gradle.properties
          echo 'org.gradle.caching=true' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          echo 'org.gradle.vfs.watch=true' >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
          chmod +x gradlew
          ./gradlew :app:assembleRelease :app:assembleDebug -PversionChannel=${{ steps.meta.outputs.versionChannel }}
          releaseApkPath="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
          debugApkPath="$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
          if [[ -z "$releaseApkPath" || -z "$debugApkPath" ]]; then
            echo "未找到构建产物，release=$releaseApkPath debug=$debugApkPath" >&2
            exit 1
          fi
          releaseName="$(basename "$releaseApkPath" .apk)"
          debugName="$(basename "$debugApkPath" .apk)"
          echo "releaseApkPath=$releaseApkPath" >> "$GITHUB_OUTPUT"
          echo "debugApkPath=$debugApkPath" >> "$GITHUB_OUTPUT"
          echo "releaseName=$releaseName" >> "$GITHUB_OUTPUT"
          echo "debugName=$debugName" >> "$GITHUB_OUTPUT"

      - name: Upload release
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildWithGradle.outputs.releaseName }}
          path: ${{ steps.buildWithGradle.outputs.releaseApkPath }}

      - name: Upload debug
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildWithGradle.outputs.debugName }}
          path: ${{ steps.buildWithGradle.outputs.debugApkPath }}

      - name: Upload mappings
        uses: actions/upload-artifact@v4
        with:
          name: mappings
          path: "app/build/outputs/mapping/release"

      - name: Resolve release metadata
        if: steps.meta.outputs.isRelease == 'true'
        id: releaseMeta
        run: |
          versionCode="$(git rev-list --count HEAD)"
          releaseApk="${{ steps.buildWithGradle.outputs.releaseApkPath }}"
          if [[ -z "$releaseApk" ]]; then
            echo "releaseApk 为空，无法发布 Release" >&2
            exit 1
          fi
          apkFileName="$(basename "$releaseApk")"
          if [[ "$apkFileName" =~ ^batteryrecorder-v(.+)-release\.apk$ ]]; then
            versionName="${BASH_REMATCH[1]}"
          elif [[ "$apkFileName" =~ ^batteryrecorder_v(.+)-[0-9]+\}?\.apk$ ]]; then
            versionName="${BASH_REMATCH[1]}"
          else
            versionName=""
          fi
          if [[ -z "$versionName" ]]; then
            echo "无法从 APK 文件名解析 versionName: $apkFileName" >&2
            exit 1
          fi
          if [[ "$versionName" != *-release ]]; then
            echo "发布版本号不符合预期（缺少 -release 后缀）: $versionName" >&2
            exit 1
          fi
          releaseVersionName="${versionName%-release}"
          if [[ -z "$releaseVersionName" ]]; then
            echo "解析发布版本号失败: $versionName" >&2
            exit 1
          fi
          releaseId="${releaseVersionName}-${versionCode}"
          echo "versionCode=$versionCode" >> "$GITHUB_OUTPUT"
          echo "versionName=$versionName" >> "$GITHUB_OUTPUT"
          echo "releaseVersionName=$releaseVersionName" >> "$GITHUB_OUTPUT"
          echo "releaseApk=$releaseApk" >> "$GITHUB_OUTPUT"
          echo "releaseId=$releaseId" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: steps.meta.outputs.isRelease == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.releaseMeta.outputs.releaseId }}
          name: ${{ steps.releaseMeta.outputs.releaseId }}
          body: ${{ steps.meta.outputs.commitMessage }}
          files: ${{ steps.releaseMeta.outputs.releaseApk }}
          fail_on_unmatched_files: true
